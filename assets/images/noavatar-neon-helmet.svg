<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">TurkMod Neon Helmet No Avatar</title>
  <desc id="desc">A modern gaming helmet avatar placeholder with cyan neon visor.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="34%" cy="24%" r="72%">
      <stop offset="0%" stop-color="#1f3b64"/>
      <stop offset="48%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#070b13"/>
    </radialGradient>
    <linearGradient id="helmetShell" x1="55" y1="42" x2="203" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="42%" stop-color="#bcc9d8"/>
      <stop offset="100%" stop-color="#6d7d91"/>
    </linearGradient>
