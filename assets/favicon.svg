<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-labelledby="title desc">
  <title id="title">Turk Mod TM favicon</title>
  <desc id="desc">Monogram favicon with the letters T and M for Turk Mod.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b1f3a"/>
      <stop offset="100%" stop-color="#4a1024"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8e7b6"/>
      <stop offset="100%" stop-color="#d4a43f"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="6.5" fill="none" stroke="url(#border)" stroke-width="1" stroke-opacity=".24"/>
  <text
    x="16"
    y="18"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial Black, Arial, system-ui, sans-serif"
    font-size="13.5"
    font-weight="900"
    letter-spacing="0"
    fill="#f7e8bf"
  >TM</text>
</svg>
